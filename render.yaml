# Render Blueprint — auto-deploys on every push to the connected GitHub branch.
# In Render: New + -> Blueprint -> pick this repo -> it creates the web service.
#
# History is stored in SUPABASE (Postgres). Set DATABASE_URL in the Render
# dashboard to your Supabase *Transaction pooler* connection string:
#   Supabase -> Project -> Connect -> ORMs/URI -> "Transaction pooler"
#   postgresql://postgres.<ref>:<PASSWORD>@aws-0-<region>.pooler.supabase.com:6543/postgres
# Then paste it as the DATABASE_URL secret below (Render marks sync:false vars
# as secrets you fill in the dashboard). The filesystem on Render is ephemeral,
# so this external DB is what keeps run history across deploys.

services:
  - type: web
    name: mall-dashboard
    runtime: python
    plan: free
    rootDir: webapp
    buildCommand: pip install -r requirements.txt
    # threads (not just workers) matter here: /api/run-stream holds an SSE
    # connection open for the whole pipeline, so sync workers alone would block.
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 180
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false        # paste your Supabase transaction-pooler URI here
      - key: MAPPEDIN_KEY
        sync: false        # optional — defaults are built in
      - key: MAPPEDIN_SECRET
        sync: false
      - key: HYPERBROWSER_API_KEY
        sync: false        # optional — enables the "Check completeness" reconciliation
                            # feature (compares the Mappedin snapshot against a live
                            # scrape of Simon's own /stores page). Unset = feature hidden,
                            # primary Mappedin path is unaffected either way.
