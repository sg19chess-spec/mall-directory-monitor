<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mall Directory Monitor</title>
<style>
  :root {
    color-scheme: light dark;
    --bg:#f5f6f8; --panel:#ffffff; --ink:#1b1e24; --muted:#6b7280;
    --line:#e6e8ec; --line-soft:#eef0f3;
    --accent:#4f46e5; --accent-soft:#eef2ff; --accent-ink:#3730a3;
    --good:#15803d; --bad:#b91c1c; --warn:#b45309;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0e1014; --panel:#161a20; --ink:#e7e9ee; --muted:#93a0b0;
      --line:#262b33; --line-soft:#20242c;
      --accent:#818cf8; --accent-soft:#1c2236; --accent-ink:#c7cdfb;
      --good:#4ade80; --bad:#f87171; --warn:#fbbf24;
    }
  }
  :root[data-theme="dark"] {
    --bg:#0e1014; --panel:#161a20; --ink:#e7e9ee; --muted:#93a0b0;
    --line:#262b33; --line-soft:#20242c;
    --accent:#818cf8; --accent-soft:#1c2236; --accent-ink:#c7cdfb;
    --good:#4ade80; --bad:#f87171; --warn:#fbbf24;
  }
  :root[data-theme="light"] {
    --bg:#f5f6f8; --panel:#ffffff; --ink:#1b1e24; --muted:#6b7280;
    --line:#e6e8ec; --line-soft:#eef0f3;
    --accent:#4f46e5; --accent-soft:#eef2ff; --accent-ink:#3730a3;
    --good:#15803d; --bad:#b91c1c; --warn:#b45309;
  }

  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.55 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { max-width:880px; margin:0 auto; padding:1.75rem 1rem 4rem; }

  header.top { display:flex; align-items:baseline; gap:.6rem; flex-wrap:wrap; margin-bottom:1.1rem; }
  header.top h1 { font-size:1.35rem; margin:0; letter-spacing:-.01em; }
  .pill { display:inline-block; background:var(--accent-soft); color:var(--accent-ink);
          border-radius:999px; padding:.12rem .6rem; font-size:.72rem; font-weight:600; }
  .sub { color:var(--muted); font-size:.82rem; margin:.1rem 0 0; width:100%; }

  .toolbar { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center;
             background:var(--panel); border:1px solid var(--line); border-radius:12px;
             padding:.7rem .8rem; margin-bottom:1.1rem; }
  .toolbar label { font-size:.7rem; text-transform:uppercase; letter-spacing:.05em;
                   color:var(--muted); margin-right:.35rem; }
  select { font:inherit; color:var(--ink); background:var(--panel);
           border:1px solid var(--line); border-radius:8px; padding:.4rem .55rem; max-width:100%; }
  select:focus-visible, button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .grow { flex:1 1 auto; }
  button.run { font:inherit; font-weight:600; color:#fff; background:var(--accent);
               border:0; border-radius:8px; padding:.5rem .95rem; cursor:pointer;
               display:inline-flex; align-items:center; gap:.45rem; }
  button.run:disabled { opacity:.6; cursor:progress; }
  .spin { width:14px; height:14px; border:2px solid #ffffff8c; border-top-color:#fff;
          border-radius:50%; animation:spin .7s linear infinite; display:none; }
  button.run.busy .spin { display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spin { animation:none; } }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
          padding:1.15rem 1.35rem; margin-bottom:1.1rem; }
  .card h2 { font-size:.78rem; text-transform:uppercase; letter-spacing:.05em;
             color:var(--muted); margin:0 0 .7rem; }
  h3 { font-size:.9rem; margin:.9rem 0 .3rem; display:flex; align-items:center; gap:.4rem; }
  h3.added { color:var(--good); } h3.removed { color:var(--bad); } h3.moved { color:var(--warn); }
  ul { margin:.2rem 0 .4rem; padding-left:1.2rem; }
  li { margin:.12rem 0; }
  .u { font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .muted { color:var(--muted); font-size:.84rem; }
  .ok { color:var(--good); font-weight:600; }

  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:.5rem .55rem; border-bottom:1px solid var(--line-soft); }
  th { font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  td.unit { font-family:var(--mono); font-variant-numeric:tabular-nums;
            color:var(--muted); white-space:nowrap; }
  .status { display:inline-block; font-size:.72rem; padding:.05rem .5rem; border-radius:999px;
            background:color-mix(in srgb, var(--good) 15%, transparent); color:var(--good); }
  .status.warn { background:color-mix(in srgb, var(--warn) 18%, transparent); color:var(--warn); }
  .err { color:var(--bad); font-size:.85rem; }
  .empty { text-align:center; color:var(--muted); padding:2rem 0; }
  .filter { font:inherit; color:var(--ink); background:var(--panel); border:1px solid var(--line);
            border-radius:8px; padding:.4rem .55rem; width:220px; max-width:100%; }

  button.ghost { font:inherit; font-weight:600; color:var(--accent); background:transparent;
                 border:1px solid var(--line); border-radius:8px; padding:.5rem .85rem; cursor:pointer;
                 display:inline-flex; align-items:center; gap:.45rem; }
  button.ghost:disabled { opacity:.5; cursor:not-allowed; }
  button.ghost.busy .spin { display:inline-block; border-top-color:var(--accent); border-color:color-mix(in srgb, var(--accent) 35%, transparent); border-top-color:var(--accent); }
  .recon-ok { color:var(--good); font-weight:600; }
  .recon-bad { color:var(--warn); font-weight:600; }
  a.siteLink { color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1 id="title">Mall Directory Monitor</h1>
    <span class="pill" id="count">—</span>
    <p class="sub" id="meta">Pick a venue and press Run, or open a previous run.</p>
  </header>

  <div class="toolbar">
    <span><label>Venue</label><select id="venue"></select></span>
    <span><label>Previous runs</label><select id="runs"><option value="">— none yet —</option></select></span>
    <span class="grow"></span>
    <input class="filter" id="filter" type="search" placeholder="Filter stores…" aria-label="Filter stores">
    <button class="ghost" id="reconcileBtn" title="Compare this snapshot against a live scrape of the mall's own site">
      <span class="spin"></span><span>Check completeness</span>
    </button>
    <button class="run" id="runBtn"><span class="spin"></span><span>Run now</span></button>
  </div>

  <div class="card" id="reconcileCard" hidden>
    <h2>Data completeness (vs official site)</h2>
    <div id="reconcileResult"></div>
  </div>

  <div class="card">
    <h2>Changes since previous run</h2>
    <div id="changes"><p class="muted">No run loaded yet.</p></div>
  </div>

  <div class="card">
    <h2>Current directory</h2>
    <div id="tableWrap"><p class="empty">No data loaded.</p></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const unitOf = s => s.location_in_outlet || s.floor || "—";

let current = null;   // currently displayed run doc

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || (r.status + " " + r.statusText));
  return r.json();
}

async function loadVenues() {
  const venues = await api("/api/venues");
  $("#venue").innerHTML = venues.map(v => `<option>${esc(v)}</option>`).join("");
}

async function loadRuns(selectId) {
  const venue = $("#venue").value;
  const runs = await api("/api/runs?venue=" + encodeURIComponent(venue));
  const opts = runs.map(r => {
    const d = (r.added + r.removed + r.moved) > 0
      ? ` — +${r.added}/-${r.removed}/↔${r.moved}` : " — no change";
    return `<option value="${esc(r.id)}">${esc(r.generated)} (${r.count})${d}</option>`;
  });
  $("#runs").innerHTML = opts.length ? opts.join("")
    : `<option value="">— none yet —</option>`;
  if (runs.length) {
    $("#runs").value = selectId && runs.some(r=>r.id===selectId) ? selectId : runs[0].id;
    await showRun($("#runs").value);
  } else {
    current = null;
    $("#changes").innerHTML = `<p class="muted">No runs recorded for this venue yet. Press <b>Run now</b>.</p>`;
    $("#tableWrap").innerHTML = `<p class="empty">No data — run the scraper to create the first snapshot.</p>`;
    $("#count").textContent = "—";
    $("#meta").textContent = "No runs yet.";
  }
}

async function showRun(id) {
  if (!id) return;
  current = await api("/api/run/" + encodeURIComponent(id));
  render(current);
}

function render(doc) {
  $("#title").textContent = doc.venue || "Mall Directory";
  $("#count").textContent = (doc.stores?.length ?? 0) + " stores";
  $("#meta").textContent = `Snapshot ${doc.generated}  ·  source: ${doc.method || "—"}`;
  renderChanges(doc.changes);
  renderTable(doc.stores || []);
}

function renderChanges(ch) {
  const el = $("#changes");
  if (!ch) { el.innerHTML = `<p class="muted">First recorded run for this venue — nothing to compare against yet.</p>`; return; }
  const total = ch.added.length + ch.removed.length + ch.moved.length;
  if (total === 0) { el.innerHTML = `<p class="ok">✓ No changes since the previous run.</p>`; return; }
  let h = "";
  if (ch.added.length) h += `<h3 class="added">➕ New (${ch.added.length})</h3><ul>` +
    ch.added.map(s => `<li>${esc(s.name)} <span class="u">${esc(unitOf(s))}</span></li>`).join("") + "</ul>";
  if (ch.removed.length) h += `<h3 class="removed">➖ Gone (${ch.removed.length})</h3><ul>` +
    ch.removed.map(s => `<li>${esc(s.name)} <span class="u">${esc(unitOf(s))}</span></li>`).join("") + "</ul>";
  if (ch.moved.length) h += `<h3 class="moved">↔ Relocated (${ch.moved.length})</h3><ul>` +
    ch.moved.map(m => `<li>${esc(m.name)}: <span class="u">${esc(m.from||"—")}</span> → <span class="u">${esc(m.to||"—")}</span></li>`).join("") + "</ul>";
  el.innerHTML = h;
}

function renderTable(stores) {
  const q = $("#filter").value.trim().toLowerCase();
  const rows = stores
    .filter(s => !q || (s.name||"").toLowerCase().includes(q) || String(unitOf(s)).toLowerCase().includes(q))
    .sort((a,b) => (a.name||"").localeCompare(b.name||""))
    .map(s => {
      const cls = (s.status && s.status !== "Open") ? "status warn" : "status";
      return `<tr><td>${esc(s.name)}</td><td class="unit">${esc(unitOf(s))}</td>` +
             `<td><span class="${cls}">${esc(s.status||"—")}</span></td></tr>`;
    }).join("");
  $("#tableWrap").innerHTML = rows
    ? `<table><thead><tr><th>Store</th><th>Unit</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`
    : `<p class="empty">No stores match “${esc(q)}”.</p>`;
}

async function checkCapabilities() {
  try {
    const cap = await api("/api/capabilities");
    const btn = $("#reconcileBtn");
    if (!cap.reconciliation) {
      btn.disabled = true;
      btn.title = "Not configured on this deployment (needs HYPERBROWSER_API_KEY).";
    }
  } catch { /* capabilities check is best-effort; leave the button as-is */ }
}

async function runReconcile() {
  const btn = $("#reconcileBtn");
  const card = $("#reconcileCard");
  const out = $("#reconcileResult");
  btn.disabled = true; btn.classList.add("busy");
  btn.querySelector("span:last-child").textContent = "Checking…";
  card.hidden = false;
  out.innerHTML = `<p class="muted">Fetching a fresh Mappedin snapshot and a live scrape of the mall's own site — this can take up to a minute…</p>`;
  try {
    const r = await api("/api/reconcile", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ venue: $("#venue").value }),
    });
    renderReconcile(r);
  } catch (e) {
    out.innerHTML = `<p class="err">${esc(e.message)}</p>`;
  } finally {
    btn.disabled = false; btn.classList.remove("busy");
    btn.querySelector("span:last-child").textContent = "Check completeness";
  }
}

function renderReconcile(r) {
  const out = $("#reconcileResult");
  const link = `<a class="siteLink" href="${esc(r.simon_url)}" target="_blank" rel="noopener">official site ↗</a>`;
  let h = `<p class="muted">Checked ${esc(r.checked_at)} · Mappedin: <b>${r.mappedin_count}</b> stores` +
          ` · ${link}: <b>${r.simon_count}</b> stores</p>`;
  if (r.in_sync) {
    h += `<p class="recon-ok">✓ In sync — every store on the official site is present in the map data.</p>`;
  } else {
    h += `<p class="recon-bad">⚠ Mismatch found — the map data may be incomplete.</p>`;
    if (r.missing_from_mappedin.length) {
      h += `<h3>On the official site but missing from Mappedin (${r.missing_from_mappedin.length})</h3><ul>` +
        r.missing_from_mappedin.map(n => `<li>${esc(n)}</li>`).join("") + "</ul>";
    }
    if (r.extra_in_mappedin.length) {
      h += `<h3>In Mappedin but not seen on the official site (${r.extra_in_mappedin.length})</h3><ul>` +
        r.extra_in_mappedin.map(n => `<li>${esc(n)}</li>`).join("") + "</ul>";
    }
  }
  out.innerHTML = h;
}

async function runNow() {
  const btn = $("#runBtn");
  btn.disabled = true; btn.classList.add("busy");
  btn.querySelector("span:last-child").textContent = "Running…";
  try {
    const doc = await api("/api/run", {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ venue: $("#venue").value }),
    });
    await loadRuns(doc.id);
  } catch (e) {
    $("#changes").innerHTML = `<p class="err">Run failed: ${esc(e.message)}</p>`;
  } finally {
    btn.disabled = false; btn.classList.remove("busy");
    btn.querySelector("span:last-child").textContent = "Run now";
  }
}

$("#runBtn").addEventListener("click", runNow);
$("#reconcileBtn").addEventListener("click", runReconcile);
$("#runs").addEventListener("change", e => showRun(e.target.value));
$("#venue").addEventListener("change", () => { $("#reconcileCard").hidden = true; loadRuns(); });
$("#filter").addEventListener("input", () => { if (current) renderTable(current.stores || []); });

(async () => {
  try { await loadVenues(); await loadRuns(); await checkCapabilities(); }
  catch (e) { $("#changes").innerHTML = `<p class="err">Could not reach the server: ${esc(e.message)}</p>`; }
})();
</script>
</body>
</html>
